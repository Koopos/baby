# Baby Update Server - Nginx 配置
# 放在你家服务器的 /etc/nginx/sites-available/baby-update
# 然后: sudo ln -s /etc/nginx/sites-available/baby-update /etc/nginx/sites-enabled/
#      sudo nginx -t && sudo systemctl reload nginx

server {
    listen 3000;
    server_name _;

    # 字符集
    charset utf-8;

    # ─── 1. 版本检查 /manifest ────────────────────────────────────
    # rewrite: /manifest?platform=android&runtime-version=1.0.3
    #     → /version.json (返回当前版本信息，动态生成)
    location /manifest {
        alias /var/www/baby-update/bundle;
        # 从 version.json 读取当前版本
        default_type application/json;

        # 内部子请求获取 version.json 内容
        # 返回格式兼容 expo-updates manifest
        content_by_lua_block {
            local version_file = io.popen("cat /var/www/baby-update/version.json")
            local version_json = version_file:read("*all")
            version_file:close()

            local version = "1.0.0"
            local bundle_file = "app.android.hbc"

            -- 解析 version.json
            local cjson = require("cjson")
            local ok, meta = pcall(cjson.decode, version_json)
            if ok and meta then
                version = meta.version or version
                bundle_file = meta.bundleFile or bundle_file
            end

            -- 读取 query 参数
            local platform = ngx.var.arg_platform or "android"
            local runtime_version = ngx.var.arg_runtime_version or version
            local sdk_version = ngx.var.arg_sdkVersion or "54.0.0"

            -- 判断是否需要更新（runtimeVersion < version 则有更新）
            local needs_update = (runtime_version ~= version)

            local bundle_url = "http://" .. ngx.var.host .. ":3000/bundle/" .. bundle_file

            local manifest = string.format([[{
  "data": {
    "id": "update-%s",
    "version": "%s",
    "runtimeVersion": "%s",
    "bundleUrl": "%s",
    "bundleKey": "%s",
    "createdAt": "%s",
    "platform": "%s"
  },
  "android": {
    "bundleUrl": "%s"
  },
  "sdkVersion": "%s",
  "releasedAt": "%s"
}]], version, version, version, bundle_url, bundle_file,
    os.date("!%Y-%m-%dT%H:%M:%SZ"), platform, bundle_url, sdk_version,
    os.date("!%Y-%m-%dT%H:%M:%SZ"))

            ngx.say(manifest)
        }
    }

    # ─── 2. Bundle 文件下载 ───────────────────────────────────────
    location /bundle/ {
        alias /var/www/baby-update/bundle/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        # 缓存一年（bundle文件名带版本，不会走重）
        expires 1y;
        access_log off;
    }

    # ─── 3. 列出所有可用版本 ───────────────────────────────────────
    location /versions {
        alias /var/www/baby-update/bundle;
        default_type application/json;
        content_by_lua_block {
            local handle = io.popen("ls /var/www/baby-update/bundle/*.hbc 2>/dev/null | xargs -I{} basename {}")
            local files = handle:read("*all")
            handle:close()

            local bundle_list = {}
            for f in files:gmatch("[^\r\n]+") do
                table.insert(bundle_list, f)
            end

            local version_file = io.popen("cat /var/www/baby-update/version.json")
            local version_json = version_file:read("*all")
            version_file:close()

            local current_version = "1.0.0"
            local cjson = require("cjson")
            local ok, meta = pcall(cjson.decode, version_json)
            if ok and meta then
                current_version = meta.version or current_version
            end

            local response = string.format([[{
  "currentVersion": "%s",
  "availableBundles": %s,
  "serverTime": "%s"
}]], current_version, cjson.encode(bundle_list), os.date("!%Y-%m-%dT%H:%M:%SZ"))

            ngx.say(response)
        }
    }

    # ─── 4. 健康检查 ───────────────────────────────────────────────
    location /health {
        default_type application/json;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # ─── 5. 列出所有版本（备用，无 Lua 时）──────────────────────────
    location /versions-simple {
        alias /var/www/baby-update/version.json;
    }
}
