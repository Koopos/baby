server {
    listen 3000;
    server_name _;

    charset utf-8;

    # Bundle 文件下载（核心）
    # 把 .hbc 文件放在 /var/www/baby-update/bundle/
    location /bundle/ {
        alias /var/www/baby-update/bundle/;
        default_type application/octet-stream;
        add_header Content-Disposition "attachment";
        expires 1y;
        access_log off;
    }

    # 版本检查：nginx 直接返回静态 manifest.json
    # manifest.json 由 buildBundle.js 自动生成
    # query string 被忽略（nginx 直接 serve 同一个文件）
    location /manifest {
        alias /var/www/baby-update/manifest.json;
        default_type application/json;
    }

    # 列出所有版本（静态文件）
    location /versions {
        alias /var/www/baby-update/versions.json;
        default_type application/json;
    }

    # 健康检查
    location /health {
        default_type application/json;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # 根路径
    location / {
        default_type application/json;
        add_header Content-Type application/json;
        return 200 '{"service":"baby-update-server","version":"See /versions"}';
    }
}
